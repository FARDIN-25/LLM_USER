<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query History & Source Contributions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1::before {
            content: "📊";
            font-size: 1.2em;
        }

        .btn-back {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s;
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .history-container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .query-item {
            border-bottom: 2px solid #e1e5e9;
            padding: 25px 0;
            margin-bottom: 25px;
        }

        .query-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .query-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .query-question {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            flex: 1;
        }

        .query-timestamp {
            font-size: 0.85em;
            color: #666;
            white-space: nowrap;
            margin-left: 20px;
        }

        .query-answer {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            line-height: 1.6;
            color: #555;
            margin: 15px 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .contributions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .contributions {
                grid-template-columns: 1fr;
            }
        }

        .contribution-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            border: 2px solid #e1e5e9;
        }

        .contribution-card.kb {
            border-color: #28a745;
        }

        .contribution-card.llm {
            border-color: #007bff;
        }

        .contribution-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-weight: 600;
            color: #333;
        }

        .contribution-header::before {
            font-size: 1.2em;
        }

        .contribution-card.kb .contribution-header::before {
            content: "📊";
        }

        .contribution-card.llm .contribution-header::before {
            content: "🧠";
        }

        .contribution-percentage {
            font-size: 2.5em;
            font-weight: bold;
            margin: 15px 0;
        }

        .contribution-card.kb .contribution-percentage {
            color: #28a745;
        }

        .contribution-card.llm .contribution-percentage {
            color: #007bff;
        }

        .contribution-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 0.9em;
            color: #666;
        }

        .contribution-detail-item {
            display: flex;
            justify-content: space-between;
        }

        .contribution-detail-label {
            font-weight: 500;
            color: #555;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1.1em;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state::before {
            content: "📝";
            font-size: 4em;
            display: block;
            margin-bottom: 20px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Query History & Source Contributions</h1>
            <a href="/" class="btn-back">← Back to Home</a>
        </div>

        <div class="history-container">
            <div id="statisticsPanel" style="background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                <div style="text-align: center;">
                    <div style="font-size: 2em; font-weight: bold; color: #667eea;" id="totalQueries">0</div>
                    <div style="color: #666; font-size: 0.9em;">Total Queries</div>
                </div>
                <div style="text-align: center;">
                    <div style="font-size: 2em; font-weight: bold; color: #28a745;" id="totalKBChunks">0</div>
                    <div style="color: #666; font-size: 0.9em;">KB Chunks</div>
                </div>
                <div style="text-align: center;">
                    <div style="font-size: 2em; font-weight: bold; color: #007bff;" id="totalKBFiles">0</div>
                    <div style="color: #666; font-size: 0.9em;">KB Files</div>
                </div>
                <div style="text-align: center;">
                    <div style="font-size: 2em; font-weight: bold; color: #f59e0b;" id="totalResponses">0</div>
                    <div style="color: #666; font-size: 0.9em;">LLM Responses</div>
                </div>
            </div>
            <div id="historyContent">
                <div class="loading">Loading query history...</div>
            </div>
        </div>
    </div>

    <script>
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatAnswer(text) {
            if (!text) return '';
            return text
                // Convert bold markdown (**text**) to HTML bold - do this first before other * replacements
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                // Convert bullet points from "- " to "• " (bullet character)
                .replace(/^(\s*)-\s+/gm, '$1• ')
                // Convert remaining single * to italic (but not if it's part of **)
                .replace(/(?<!\*)\*([^*]+?)(?!\*)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>');
        }

        function formatBytes(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        async function loadHistory() {
            try {
                const response = await fetch('/api/query-history');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                
                // Update statistics panel
                if (data.statistics) {
                    document.getElementById('totalQueries').textContent = data.statistics.total_queries || 0;
                    document.getElementById('totalKBChunks').textContent = data.statistics.total_kb_chunks || 0;
                    document.getElementById('totalKBFiles').textContent = data.statistics.kb_files || 0;
                    document.getElementById('totalResponses').textContent = data.statistics.total_responses || 0;
                }
                
                const historyContent = document.getElementById('historyContent');
                
                if (!data.queries || data.queries.length === 0) {
                    historyContent.innerHTML = '<div class="empty-state">No queries yet. Ask a question to see the history with KB/LLM contributions.</div>';
                    return;
                }
                
                let html = '';
                data.queries.forEach(query => {
                    const timestamp = new Date(query.timestamp).toLocaleString();
                    const kbPercent = query.kb_contribution?.percentage || 0;
                    const llmPercent = query.llm_contribution?.percentage || 0;
                    const kbChunks = query.kb_contribution?.chunks_count || 0;
                    const kbContextLength = query.kb_contribution?.context_chars || 0;
                    const kbSources = query.kb_contribution?.sources || [];
                    const llmResponseLength = query.llm_contribution?.response_chars || 0;
                    const llmTokens = query.llm_contribution?.total_tokens || 0;
                    const llmModel = query.llm_contribution?.model || 'Unknown';
                    
                    html += `
                        <div class="query-item">
                            <div class="query-header">
                                <div class="query-question">Q: ${escapeHtml(query.question)}</div>
                                <div class="query-timestamp">${timestamp}</div>
                            </div>
                            <div class="query-answer">
                                <strong>A:</strong> ${formatAnswer(query.answer || 'No answer available')}
                            </div>
                            <div class="contributions">
                                <div class="contribution-card kb">
                                    <div class="contribution-header">Knowledge Base</div>
                                    <div class="contribution-percentage">${kbPercent.toFixed(1)}%</div>
                                    <div class="contribution-details">
                                        <div class="contribution-detail-item">
                                            <span class="contribution-detail-label">Chunks Used:</span>
                                            <span>${kbChunks}</span>
                                        </div>
                                        <div class="contribution-detail-item">
                                            <span class="contribution-detail-label">Context Length:</span>
                                            <span>${formatBytes(kbContextLength)}</span>
                                        </div>
                                        <div class="contribution-detail-item">
                                            <span class="contribution-detail-label">Sources:</span>
                                            <span>${kbSources.length > 0 ? kbSources.join(', ') : 'None'}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="contribution-card llm">
                                    <div class="contribution-header">LLM Model</div>
                                    <div class="contribution-percentage">${llmPercent.toFixed(1)}%</div>
                                    <div class="contribution-details">
                                        <div class="contribution-detail-item">
                                            <span class="contribution-detail-label">Response Length:</span>
                                            <span>${formatBytes(llmResponseLength)}</span>
                                        </div>
                                        <div class="contribution-detail-item">
                                            <span class="contribution-detail-label">Tokens Used:</span>
                                            <span>${llmTokens}</span>
                                        </div>
                                        <div class="contribution-detail-item">
                                            <span class="contribution-detail-label">Model:</span>
                                            <span>${escapeHtml(llmModel)}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                historyContent.innerHTML = html;
            } catch (error) {
                console.error('Error fetching query history:', error);
                const historyContent = document.getElementById('historyContent');
                if (historyContent) {
                    historyContent.innerHTML = '<div class="error">Error loading query history. Please refresh the page.</div>';
                }
            }
        }

        // Load history on page load
        loadHistory();

        // Refresh history every 10 seconds
        setInterval(loadHistory, 10000);

    </script>
</body>
</html>
